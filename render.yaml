services:
  - type: web
      name: tewfiksoft-telegram-bot
          env: node
              plan: free
                  buildCommand: npm install
                      startCommand: npm start
                          envVars:
                                - key: BOT_TOKEN
                                        sync: false
                                              - key: NODE_ENV
                                                      value: production
                                                          healthCheckPath: /
                                                              autoDeploy: true
